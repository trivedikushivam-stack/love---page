<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Do You Love Me? ❤️</title>
    <style>
        body { 
            margin: 0; height: 100vh; display: flex; flex-direction: column;
            justify-content: center; align-items: center; 
            background: #ffdde1; background: linear-gradient(to bottom, #ee9ca7, #ffdde1);
            font-family: 'Comic Sans MS', cursive, sans-serif; overflow: hidden;
        }

        /* Cartoon Phone Container */
        .phone-container { position: relative; margin-bottom: 20px; animation: bounce 2s infinite; }

        /* Mobile Body */
        .phone {
            width: 80px; height: 140px; background: #333; border: 4px solid #000;
            border-radius: 15px; position: relative; display: flex; justify-content: center;
        }

        /* Phone Screen */
        .phone::after {
            content: ''; position: absolute; top: 10px; width: 60px; height: 100px;
            background: #87CEEB; border-radius: 5px;
        }

        /* Eyes on Phone */
        .eyes { position: absolute; top: 30px; z-index: 2; display: flex; gap: 15px; }
        .eye { width: 10px; height: 10px; background: #000; border-radius: 50%; animation: blink 3s infinite; }

        /* Typing Dots Animation */
        .typing {
            position: absolute; top: -40px; background: white; padding: 10px;
            border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); display: flex; gap: 5px;
        }
        .dot { width: 8px; height: 8px; background: #ff4d6d; border-radius: 50%; animation: type 1s infinite; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes type { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        @keyframes blink { 0%, 90%, 100% { transform: scaleY(1); } 95% { transform: scaleY(0.1); } }

        /* Card & Buttons */
        .container { 
            text-align: center; background: rgba(255, 255, 255, 0.8);
            padding: 30px; border-radius: 25px; box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            border: 4px solid #ff4d6d; z-index: 10;
        }
        h1 { color: #ff4d6d; font-size: 2rem; }
        button { padding: 12px 25px; font-size: 1.1rem; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; }
        #yesBtn { background: #ff4d6d; color: white; transition: 0.3s; }
        #noBtn { background: #fff; color: #ff4d6d; position: absolute; border: 2px solid #ff4d6d; }
    </style>
</head>
<body>

    <div class="phone-container">
        <div class="typing">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
        <div class="phone">
            <div class="eyes">
                <div class="eye"></div>
                <div class="eye"></div>
            </div>
        </div>
    </div>

    <div class="container">
        <h1 id="question">Will you be my Valentine? ❤️</h1>
        <div style="height: 50px; margin-top: 20px;">
            <button id="yesBtn">Yes!</button>
            <button id="noBtn">No</button>
        </div>
    </div>

    <script>
        const yesBtn = document.querySelector('#yesBtn');
        const noBtn = document.querySelector('#noBtn');
        const question = document.querySelector('#question');

        noBtn.addEventListener('mouseover', () => {
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight);
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';
        });

        yesBtn.addEventListener('click', () => {
            question.innerHTML = "Yay! I'm so happy! 🥰✨";
            document.querySelector('.typing').innerHTML = "❤️ ❤️ ❤️";
            noBtn.style.display = 'none';
        });
    </script>

</body>
</html>
